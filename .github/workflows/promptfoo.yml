name: LLM Evaluation Tests (Promptfoo)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Install Promptfoo
      - name: Install Promptfoo
        run: npm install -g promptfoo

      # Run evaluation + export results (ONLY ONCE)
      - name: Run Promptfoo evaluation
        run: promptfoo eval -c promptfoo-llm-tests/security-tests.yaml --output results.json

      # Upload results as artifact
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: promptfoo-results
          path: results.json